<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Quotes</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: white;
      margin: 0;
      padding: 2rem;
      min-height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 2rem;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    #quotes-container {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      align-items: center;
    }

    .quote-card {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 15px;
      padding: 2rem;
      margin: 0 auto;
      max-width: 700px;
      width: 100%;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      transition: transform 0.3s ease;
    }

    .quote-card:hover {
      transform: translateY(-5px);
    }

    .quote-text {
      font-size: 1.4rem;
      margin-bottom: 1rem;
      font-style: italic;
      line-height: 1.6;
    }

    .quote-author {
      font-size: 1.1rem;
      color: #ffd700;
      font-weight: bold;
      margin-bottom: 0.5rem;
    }

    .quote-date {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.7);
    }

    .loading {
      font-size: 1.2rem;
      margin-top: 2rem;
    }

    .error {
      color: #ff6b6b;
      font-size: 1.1rem;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }
      .quote-card {
        padding: 1.5rem;
      }
      .quote-text {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <h1>📚 Daily Quotes</h1>
  <div id="quotes-container">
    <div class="loading">Loading quotes...</div>
  </div>

  <script>
    // Fetch and display quotes
    fetch('quotes.json')
      .then(response => {
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        return response.json();
      })
      .then(data => {
        const container = document.getElementById('quotes-container');
        
        if (data.length === 0) {
          container.innerHTML = '<p class="error">No quotes yet. Check back tomorrow!</p>';
          return;
        }
        
        // Clear loading message
        container.innerHTML = '';
        
        // Display quotes (newest first)
        data.reverse().forEach(quote => {
          const card = document.createElement('div');
          card.className = 'quote-card';
          card.innerHTML = `
            <div class="quote-text">"${quote.quote}"</div>
            <div class="quote-author">— ${quote.author}</div>
            <div class="quote-date">${quote.date}</div>
          `;
          container.appendChild(card);
        });
      })
      .catch(error => {
        console.error('Error fetching quotes:', error);
        document.getElementById('quotes-container').innerHTML = 
          '<p class="error">Failed to load quotes. Try refreshing the page.</p>';
      });
  </script>
</body>
</html>
