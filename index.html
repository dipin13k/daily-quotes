<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ Timeless Wisdom</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #654ea3 0%, #eaafc8 100%);
      --card-bg: rgba(255, 255, 255, 0.15);
      --header-color: #f8f9fa;
      --accent: #ff6b6b;
      --accent2: #4ecdc4;
      --glass-border: 1px solid rgba(255, 255, 255, 0.18);
      --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
      --transition-fast: 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      --transition-smooth: 0.5s ease-in-out;
      --border-radius: 20px;
    }

    [data-theme="dark"] {
      --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      --card-bg: rgba(20, 20, 30, 0.35);
      --header-color: #f8f9fa;
      --accent: #ff6b6b;
      --accent2: #4ecdc4;
      --glass-border: 1px solid rgba(70, 70, 90, 0.2);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg-gradient);
      color: var(--header-color);
      min-height: 100vh;
      padding: 2rem;
      position: relative;
      overflow-x: hidden;
      transition: background 1s var(--transition-smooth);
    }

    /* Floating particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }
    .particle {
      position: absolute;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      z-index: -1;
      animation: float 15s linear infinite;
    }
    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); opacity: 0; }
      10% { opacity: 0.7; }
      90% { opacity: 0.7; }
      100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
    }

    /* Header with typing animation */
    header {
      text-align: center;
      margin: 2rem 0 3rem;
      position: relative;
      z-index: 1;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 8vw, 4rem);
      margin-bottom: 1rem;
      background: linear-gradient(45deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      position: relative;
      display: inline-block;
    }
    h1::before, h1::after {
      content: "✦";
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: var(--accent);
      opacity: 0.7;
    }
    h1::before { left: -2rem; }
    h1::after { right: -2rem; }

    .subtitle {
      color: rgba(255, 255, 255, 0.9);
      font-weight: 300;
      font-size: clamp(1rem, 4vw, 1.4rem);
      display: block;
      margin-top: 0.5rem;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
      letter-spacing: 1px;
    }

    /* Theme toggle */
    .theme-toggle {
      position: fixed;
      top: 2rem;
      right: 2rem;
      width: 45px;
      height: 45px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-fast);
      z-index: 999;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .theme-toggle:hover {
      transform: scale(1.1) rotate(30deg);
      background: rgba(255,255,255,0.2);
      box-shadow: 0 0 15px rgba(255,255,255,0.2);
    }
    .theme-toggle span {
      font-size: 1.3rem;
    }

    /* Quotes grid */
    #quotes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
      max-width: 1400px;
      margin: 0 auto;
      opacity: 0;
      animation: fadeIn 1s var(--transition-smooth) forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Quote cards with flip effect */
    .quote-card {
      background: var(--card-bg);
      border-radius: var(--border-radius);
      padding: 2rem;
      position: relative;
      box-shadow: var(--glass-shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: var(--glass-border);
      transition: var(--transition-fast);
      transform-style: preserve-3d;
      transform: perspective(1000px) rotateY(0deg);
      min-height: 280px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      opacity: 0;
      animation: cardAppear 0.8s var(--transition-smooth) forwards;
    }
    .quote-card:nth-child(1) { animation-delay: 0.1s; }
    .quote-card:nth-child(2) { animation-delay: 0.2s; }
    .quote-card:nth-child(3) { animation-delay: 0.3s; }
    .quote-card:nth-child(4) { animation-delay: 0.4s; }
    .quote-card:nth-child(5) { animation-delay: 0.5s; }
    .quote-card:nth-child(6) { animation-delay: 0.6s; }
    @keyframes cardAppear {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .quote-card:hover {
      transform: perspective(1000px) rotateY(10deg) scale(1.03);
      box-shadow: 0 20px 50px 0 rgba(0,0,0,0.2);
      border-color: var(--accent);
    }

    /* Quote text styling */
    .quote-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
      position: relative;
      transition: var(--transition-fast);
    }
    .quote-text::before {
      content: "❝";
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      line-height: 1;
      color: var(--accent);
      opacity: 0.3;
      position: absolute;
      top: -1.5rem;
      left: -1rem;
    }

    /* Author styling */
    .quote-author {
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent2);
      margin-top: auto;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .quote-author::before {
      content: "— ";
      color: var(--header-color);
      opacity: 0.7;
    }
    .quote-date {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.7);
      font-style: italic;
      margin-top: 0.5rem;
      display: block;
    }

    /* Loading & error states */
    .loading {
      text-align: center;
      font-size: 1.5rem;
      padding: 3rem;
      color: var(--accent);
      animation: loadingPulse 2s ease-in-out infinite alternate;
      grid-column: 1 / -1;
    }
    @keyframes loadingPulse {
      from { opacity: 0.5; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }
    .error {
      background: rgba(255, 50, 50, 0.2);
      color: #ff9999;
      border: 1px solid rgba(255,100,100,0.2);
      text-align: center;
      padding: 2rem 1rem;
      border-radius: var(--border-radius);
      margin: 2rem 0;
      font-size: 1.1rem;
      grid-column: 1 / -1;
    }
    .error button {
      padding: 8px 20px;
      margin-top: 1rem;
      background: linear-gradient(45deg, var(--accent), var(--accent2));
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      transition: all 0.3s;
    }
    .error button:hover {
      transform: scale(1.1);
      box-shadow: 0 5px 15px rgba(255,100,100,0.3);
    }

    /* Floating animation for cards */
    @keyframes floatCard {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .quote-card:hover {
      animation: floatCard 3s ease-in-out infinite;
    }

    /* Mobile responsiveness */
    @media (max-width: 768px) {
      #quotes-grid {
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      }
      .quote-card {
        padding: 1.5rem;
        min-height: 250px;
      }
      .quote-text {
        font-size: 1.2rem;
      }
      .theme-toggle {
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
      }
    }
    @media (max-width: 600px) {
      body { padding: 1rem; }
      .quote-card {
        min-height: 220px;
      }
      .quote-text::before {
        font-size: 2.5rem;
        top: -1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <header>
    <h1>TIMELESS WISDOM</h1>
    <span class="subtitle">From the Past to the Present</span>
  </header>

  <div id="quotes-grid">
    <div class="loading">
      <span>🔮 Loading wisdom through the ages...</span>
    </div>
  </div>

  <div class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">
    <span id="theme-icon">🌙</span>
  </div>

  <script>
    // Create animated particles
    function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 25; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        const size = Math.random() * 50 + 5;
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.left = `${Math.random() * 100}vw`;
        particle.style.opacity = Math.random() * 0.4 + 0.1;
        particle.style.background = `hsl(${Math.random() * 360}, 70%, 60%, ${Math.random() * 0.1 + 0.02})`;
        particle.style.animationDuration = `${Math.random() * 20 + 15}s`;
        particle.style.animationDelay = `${Math.random() * 10}s`;
        container.appendChild(particle);
      }
    }

    // Dark mode toggle
    function toggleTheme() {
      const icon = document.getElementById('theme-icon');
      const body = document.body;
      
      if (body.getAttribute('data-theme') === 'dark') {
        body.setAttribute('data-theme', 'light');
        icon.innerHTML = '🌙';
        localStorage.setItem('theme', 'light');
      } else {
        body.setAttribute('data-theme', 'dark');
        icon.innerHTML = '☀️';
        localStorage.setItem('theme', 'dark');
      }
    }

    // Set theme from localStorage
    function setInitialTheme() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      const icon = document.getElementById('theme-icon');
      document.body.setAttribute('data-theme', savedTheme);
      icon.innerHTML = savedTheme === 'dark' ? '☀️' : '🌙';
    }

    // Main quote loading
    async function loadQuotes() {
      const container = document.getElementById('quotes-grid');
      
      try {
        const response = await fetch('quotes.json');
        const data = await response.json();
        
        if (!data || data.length === 0) {
          container.innerHTML = '<div class="error">No quotes found. Check back later! ✨</div>';
          return;
        }
        
        // Clear loading
        container.innerHTML = '';
        
        // Sort from oldest to newest
        const sortedQuotes = [...data].sort((a, b) => new Date(a.date) - new Date(b.date));
        
        // Create cards
        sortedQuotes.forEach((quote, index) => {
          const card = document.createElement('div');
          card.className = 'quote-card';
          card.style.animationDelay = `${index * 0.1}s`;
          
          // Format date
          const formattedDate = new Date(quote.date).toLocaleDateString('en-US', {
            year: 'numeric',
            month: 'short',
            day: 'numeric'
          });
          
          card.innerHTML = `
            <div class="quote-text">${quote.quote}</div>
            <div class="quote-author">${quote.author}</div>
            <div class="quote-date">${formattedDate}</div>
          `;
          
          container.appendChild(card);
          
          // Add hover effect
          card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            const rotateY = (x - centerX) / 15;
            const rotateX = (centerY - y) / 15;
            
            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.03)`;
          });
          
          card.addEventListener('mouseout', () => {
            card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale(1)';
          });
        });
        
      } catch (error) {
        console.error('Error:', error);
        container.innerHTML = `
          <div class="error">
            Failed to load quotes. Try again later.<br>
            <button onclick="location.reload()">🔁 Refresh Page</button>
          </div>
        `;
      }
    }

    // Initialize on page load
    window.addEventListener('DOMContentLoaded', () => {
      createParticles();
      setInitialTheme();
      setTimeout(loadQuotes, 500);
    });
  </script>
</body>
</html>
