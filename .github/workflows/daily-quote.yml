name: Daily Quote

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Fetch and save quote
        run: |
          python3 << 'EOF'
          import requests
          import json
          from datetime import datetime
          
          # Fetch random quote
          response = requests.get('https://api.quotable.io/random')
          data = response.json()
          
          # Create quote entry
          entry = {
              "date": datetime.now().strftime('%Y-%m-%d'),
              "quote": data['content'],
              "author": data['author']
          }
          
          # Read existing quotes
          try:
              with open('quotes.json', 'r') as f:
                  quotes = json.load(f)
          except FileNotFoundError:
              quotes = []
          
          # Add new quote
          quotes.append(entry)
          
          # Write back to file
          with open('quotes.json', 'w') as f:
              json.dump(quotes, f, indent=2)
          
          print(f"✅ Quote saved: {entry['quote'][:50]}...")
          
          EOF
      
      - name: Configure Git
        run: |
          git config user.name "dipin13k"
          git config user.email "dipinkhadka130@gmail.com"
      
      - name: Commit changes
        run: |
          git add index.html quotes.json
          git commit -m "📅 Daily quote: $(date '+%Y-%m-%d')"
          git push
