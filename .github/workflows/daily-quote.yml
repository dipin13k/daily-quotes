name: Daily Quote

on:
  schedule:
    - cron: '0 8 * * *'  # 8 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  quote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Get all history for all branches and tags
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Fetch and save quote
        env:
          TZ: America/New_York  # Change to your timezone
        run: |
          python3 << 'EOF'
          import requests
          import json
          from datetime import datetime
          import sys
          import time

          def get_quote():
              # Try primary API
              try:
                  response = requests.get('https://api.quotable.io/random', timeout=10)
                  response.raise_for_status()
                  data = response.json()
                  return {
                      "quote": data['content'],
                      "author": data['author']
                  }
              except Exception as e:
                  print(f"Primary API failed: {e}")
              
              # Fallback API
              try:
                  response = requests.get('https://zenquotes.io/api/random', timeout=10)
                  response.raise_for_status()
                  data = response.json()[0]
                  return {
                      "quote": data['q'],
                      "author": data['a']
                  }
              except Exception as e:
                  print(f"Fallback API failed: {e}")
                  return None

          try:
              # Get quote with retry logic
              quote = None
              for attempt in range(3):
                  quote = get_quote()
                  if quote:
                      break
                  print(f"Attempt {attempt + 1} failed, retrying...")
                  time.sleep(2)
              
              if not quote:
                  raise Exception("All quote APIs failed")
              
              # Create entry
              entry = {
                  "date": datetime.now().strftime('%Y-%m-%d'),
                  "quote": quote['quote'],
                  "author": quote['author']
              }
              
              # Read existing quotes
              try:
                  with open('quotes.json', 'r', encoding='utf-8') as f:
                      quotes = json.load(f)
              except FileNotFoundError:
                  quotes = []
              except json.JSONDecodeError:
                  quotes = []
                  print("⚠️ quotes.json was corrupted, starting fresh")
              
              # Add new quote and keep last 30
              quotes.append(entry)
              quotes = quotes[-30:]
              
              # Write back to file
              with open('quotes.json', 'w', encoding='utf-8') as f:
                  json.dump(quotes, f, indent=2, ensure_ascii=False)
              
              print(f"✅ Quote saved: {entry['quote'][:60]}...")
              print(f"📅 Total quotes: {len(quotes)}")
              
          except Exception as e:
              print(f"❌ Critical error: {e}", file=sys.stderr)
              sys.exit(1)
          EOF
      
      - name: Commit and push
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add quotes.json
          git status
          if ! git diff-index --quiet HEAD --; then
            git commit -m "📅 Daily quote: $(date -u +'%Y-%m-%d')"
            git pull --rebase  # Avoid conflicts
            git push
          else
            echo "No changes to commit"
          fi
